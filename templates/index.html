<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* The Background Magic Happens Here */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            /* You can change this URL to any image link you want! */
            background-image: url('https://images.unsplash.com/photo-1516979187457-637abb4f9353?q=80&w=2070'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            display: flex; 
            justify-content: center; 
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        
        /* The Frosted Glass Effect */
        .chat-container { 
            width: 100%; 
            max-width: 700px; 
            height: 85vh;
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(12px); /* This blurs the background behind the window */
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            padding: 25px; 
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h2 { text-align: center; margin-top: 0; color: #333; }
        
        .chat-box { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 15px; 
            margin-bottom: 20px; 
            border-radius: 10px; 
            background: rgba(255, 255, 255, 0.6); /* Slightly transparent chat area */
            border: 1px solid rgba(0,0,0,0.05);
        }
        
        .message { margin-bottom: 15px; padding: 12px 18px; border-radius: 15px; max-width: 80%; line-height: 1.5; font-size: 15px; }
        .user { background: #007bff; color: white; margin-left: auto; text-align: right; border-bottom-right-radius: 2px; }
        .bot { background: #ffffff; color: #333; margin-right: auto; border-bottom-left-radius: 2px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        .bot pre { background: #282c34; color: #abb2bf; padding: 10px; border-radius: 8px; overflow-x: auto; }
        .bot code { background: #f1f1f1; color: #d63384; padding: 2px 5px; border-radius: 4px; font-family: monospace; }
        
        .input-group { display: flex; gap: 10px; }
        select, input, button { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }
        select { background: white; cursor: pointer; }
        input { flex: 1; }
        input:focus { border-color: #007bff; }
        button { background: #007bff; color: white; cursor: pointer; border: none; font-weight: bold; transition: 0.2s; }
        button:hover { background: #0056b3; transform: translateY(-1px); }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>Academic Assistant</h2>
    
    <div class="input-group" style="margin-bottom: 15px;">
        <label style="align-self: center; font-weight: bold; color: #444;">I am in: </label>
        <select id="grade">
            <option value="10th Grade">10th Grade</option>
            <option value="12th Grade">12th Grade</option>
            <option value="College">College</option>
        </select>
    </div>

    <div class="chat-box" id="chat-box">
        <div class="message bot">Hello! What academic topic can I help you with today?</div>
    </div>

    <div class="input-group">
        <input type="text" id="user-input" placeholder="Type your question here...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    async function sendMessage() {
        let inputField = document.getElementById("user-input");
        let message = inputField.value;
        let grade = document.getElementById("grade").value;
        let chatBox = document.getElementById("chat-box");

        if (!message) return;

        chatBox.innerHTML += `<div class="message user">${message}</div>`;
        inputField.value = "";
        chatBox.scrollTop = chatBox.scrollHeight; 

        let botTypingID = "typing-" + Date.now();
        chatBox.innerHTML += `<div class="message bot" id="${botTypingID}"><em>Typing...</em></div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            let response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: message, grade: grade })
            });

            let data = await response.json();
            document.getElementById(botTypingID).innerHTML = marked.parse(data.reply);
        } catch (error) {
            document.getElementById(botTypingID).innerHTML = "Oops! Something went wrong trying to connect.";
        }
        
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    document.getElementById("user-input").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            sendMessage();
        }
    });
</script>
<script>
    // This array is the "Brain". It stores the whole conversation.
    let chatHistory = []; 

    async function sendMessage() {
        let inputField = document.getElementById("user-input");
        let message = inputField.value;
        let grade = document.getElementById("grade").value;
        let chatBox = document.getElementById("chat-box");

        if (!message) return;

        // Put user message on screen
        chatBox.innerHTML += `<div class="message user">${message}</div>`;
        inputField.value = "";
        chatBox.scrollTop = chatBox.scrollHeight; 

        // Create a spot for the bot's incoming message
        let botTypingID = "typing-" + Date.now();
        chatBox.innerHTML += `<div class="message bot" id="${botTypingID}"></div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            // Send the message AND the chat history to Python
            let response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    message: message, 
                    grade: grade,
                    history: chatHistory 
                })
            });

            // Read the streaming response line-by-line
            let reader = response.body.getReader();
            let decoder = new TextDecoder("utf-8");
            let botReply = "";
            let botMessageDiv = document.getElementById(botTypingID);

            while (true) {
                let { done, value } = await reader.read();
                if (done) break;
                
                // Add the new chunk of text as it arrives
                botReply += decoder.decode(value, { stream: true });
                
                // Format it with markdown and update the screen instantly
                botMessageDiv.innerHTML = marked.parse(botReply);
                chatBox.scrollTop = chatBox.scrollHeight;
            }

            // Save this back-and-forth to the memory array for next time
            chatHistory.push({ role: "user", text: message });
            chatHistory.push({ role: "model", text: botReply });

        } catch (error) {
            document.getElementById(botTypingID).innerHTML = "Oops! Connection error.";
        }
    }

    document.getElementById("user-input").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            sendMessage();
        }
    });
</script>
</body>
</html>
